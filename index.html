<!DOCTYPE html>
<html>
<head>
  <title>Lane Car Racing Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: #111;
      color: white;
      margin: 0;
    }

    #gameArea {
      width: 300px;
      height: 500px;
      background: #333;
      margin: 20px auto;
      position: relative;
      overflow: hidden;
      border: 2px solid white;
    }

    /* road lanes */
    .lane-line {
      position: absolute;
      width: 2px;
      height: 100%;
      background: #555;
      top: 0;
    }

    #lane1 { left: 100px; }
    #lane2 { left: 200px; }

    /* player car */
    #car {
      width: 35px;
      height: 55px;
      background: linear-gradient(red, darkred);
      position: absolute;
      bottom: 10px;
      left: 130px;
      border-radius: 8px;
      box-shadow: 0 0 10px red;
    }

    /* enemy cars */
    .enemy {
      width: 35px;
      height: 55px;
      background: linear-gradient(yellow, orange);
      position: absolute;
      top: -60px;
      border-radius: 8px;
      box-shadow: 0 0 8px yellow;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      margin: 5px;
    }

    #controls {
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>🚗 Lane Racing Game</h2>

<p>Score: <span id="score">0</span></p>
<p>High Score: <span id="highScore">0</span></p>

<button onclick="startGame()">Start Game</button>

<div id="gameArea">
  <div class="lane-line" id="lane1"></div>
  <div class="lane-line" id="lane2"></div>

  <div id="car"></div>
</div>

<div id="controls">
  <button onclick="moveLeft()">⬅️</button>
  <button onclick="moveRight()">➡️</button>
</div>

<script>
let car = document.getElementById("car");
let scoreDisplay = document.getElementById("score");
let highScoreDisplay = document.getElementById("highScore");

let score = 0;
let highScore = localStorage.getItem("laneHighScore") || 0;
highScoreDisplay.textContent = highScore;

let lanes = [60, 130, 200]; // 3 lanes
let laneIndex = 1; // start center lane

let gameInterval;
let enemyInterval;

// keyboard control
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowLeft") moveLeft();
  if (e.key === "ArrowRight") moveRight();
});

// swipe control
let startX = 0;

document.addEventListener("touchstart", (e) => {
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend", (e) => {
  let endX = e.changedTouches[0].clientX;

  if (startX - endX > 30) moveLeft();
  if (endX - startX > 30) moveRight();
});

// move car between lanes
function updateCar() {
  car.style.left = lanes[laneIndex] + "px";
}

function moveLeft() {
  if (laneIndex > 0) {
    laneIndex--;
    updateCar();
  }
}

function moveRight() {
  if (laneIndex < lanes.length - 1) {
    laneIndex++;
    updateCar();
  }
}

// enemy cars
function createEnemy() {
  let enemy = document.createElement("div");
  enemy.classList.add("enemy");

  let enemyLane = Math.floor(Math.random() * 3);
  enemy.style.left = lanes[enemyLane] + "px";

  document.getElementById("gameArea").appendChild(enemy);

  let move = setInterval(() => {
    let top = enemy.offsetTop;
    enemy.style.top = top + 6 + "px";

    // collision
    if (
      top > 420 &&
      enemyLane === laneIndex
    ) {
      endGame();
    }

    if (top > 500) {
      enemy.remove();
      clearInterval(move);
    }
  }, 20);
}

// start game
function startGame() {
  score = 0;
  laneIndex = 1;
  updateCar();

  scoreDisplay.textContent = score;

  gameInterval = setInterval(() => {
    score++;
    scoreDisplay.textContent = score;
  }, 200);

  enemyInterval = setInterval(createEnemy, 800);
}

// end game
function endGame() {
  clearInterval(gameInterval);
  clearInterval(enemyInterval);

  alert("Game Over! Score: " + score);

  if (score > highScore) {
    highScore = score;
    localStorage.setItem("laneHighScore", highScore);
  }

  highScoreDisplay.textContent = highScore;

  location.reload();
}

// init position
updateCar();
</script>

</body>
</html>
